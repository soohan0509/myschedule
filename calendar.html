<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경기북과학고 1학년 일정</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="env.js"></script>

  <!-- 헤더 -->
  <header class="app-header">
    <h1>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>경기북과학고 1학년 일정
    </h1>
    <div class="header-right">
      <span class="user-info" id="user-info"></span>
      <div style="position:relative">
        <button class="notification-btn" id="notif-btn" title="알림">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-badge" id="notif-badge">0</span>
        </button>
        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-header">알림</div>
          <div id="notif-list"><div class="notif-empty">새 알림이 없습니다</div></div>
        </div>
      </div>
      <button class="notification-btn" id="settings-btn" title="설정">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <a href="admin.html" class="btn btn-secondary btn-sm" id="admin-btn" style="display:none">어드민</a>
      <button class="btn btn-primary btn-sm" id="logout-btn">로그아웃</button>
    </div>
  </header>

  <!-- 반 탭 -->
  <div class="class-tabs" id="class-tabs">
    <div class="tab" data-class="1">1반</div>
    <div class="tab" data-class="2">2반</div>
    <div class="tab" data-class="3">3반</div>
    <div class="tab" data-class="4">4반</div>
    <div class="tab" data-class="5">5반</div>
  </div>

  <!-- 메인 콘텐츠 -->
  <div class="main-content">
    <div class="calendar-section">
      <div class="calendar-nav">
        <button class="nav-btn" id="prev-month">◀</button>
        <h2 id="month-title"></h2>
        <button class="nav-btn" id="next-month">▶</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
    <div class="detail-panel">
      <div class="detail-card" id="detail-card">
        <p style="color:var(--text-muted);font-size:0.9rem">날짜를 클릭하면<br>시간표와 일정이 표시됩니다.</p>
      </div>
    </div>
  </div>

  <!-- 일정 추가 모달 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modal-heading">일정 추가</h3>
      <div class="type-selector">
        <div class="type-btn active" data-type="class">📢 반 전체</div>
        <div class="type-btn" data-type="personal">🔒 개인</div>
        <div class="type-btn" data-type="group">👥 그룹</div>
      </div>
      <div id="group-section" style="display:none">
        <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:6px">그룹 멤버 선택 (같은 반)</p>
        <div class="member-list" id="member-list"></div>
      </div>
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="modal-title-input" placeholder="일정 제목" required>
      </div>
      <div class="form-group">
        <label>세부 정보 (시간, 장소 등)</label>
        <textarea id="modal-detail" rows="3" placeholder="세부 내용 입력..."></textarea>
      </div>
      <div class="file-input-area" id="file-drop">
        📎 파일 또는 사진 첨부 (클릭)
        <input type="file" id="file-input" style="display:none" multiple>
      </div>
      <div class="file-list" id="file-list"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">취소</button>
        <button class="btn btn-primary" id="modal-submit">저장</button>
      </div>
    </div>
  </div>

  <!-- 일과 추가 모달 -->
  <div class="modal-overlay" id="routine-modal">
    <div class="modal">
      <h3>📋 일과 추가</h3>
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="routine-title" placeholder="예: 개인 운동, 독서 등">
      </div>
      <div style="display:flex;gap:12px">
        <div class="form-group" style="flex:1">
          <label>시작 시간</label>
          <input type="time" id="routine-start">
        </div>
        <div class="form-group" style="flex:1">
          <label>종료 시간</label>
          <input type="time" id="routine-end">
        </div>
      </div>
      <div class="form-group">
        <label>반복</label>
        <div class="type-selector">
          <div class="type-btn active" id="rpt-no">✕ 안 함</div>
          <div class="type-btn" id="rpt-yes">🔁 반복</div>
        </div>
      </div>

      <!-- 반복 안 함: 날짜 직접 선택 -->
      <div id="specific-section">
        <div class="form-group">
          <label>날짜 선택 <span id="routine-selected-count" style="color:var(--primary);font-size:0.8rem"></span></label>
          <div class="mini-cal">
            <div class="mini-cal-nav">
              <button type="button" id="mini-prev">◀</button>
              <span id="mini-month-title"></span>
              <button type="button" id="mini-next">▶</button>
            </div>
            <div class="mini-cal-grid" id="mini-cal-grid"></div>
          </div>
        </div>
      </div>

      <!-- 반복 설정 -->
      <div id="repeat-section" style="display:none">
        <div class="form-group">
          <label>반복 간격</label>
          <div class="type-selector" id="interval-selector">
            <div class="type-btn active" data-interval="daily">1일</div>
            <div class="type-btn" data-interval="weekly">1주</div>
            <div class="type-btn" data-interval="monthly">1개월</div>
            <div class="type-btn" data-interval="yearly">1년</div>
          </div>
        </div>
        <div id="weekday-section" style="display:none">
          <div class="form-group">
            <label>요일 선택</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <label class="type-btn" style="flex:none;cursor:pointer"><input type="checkbox" value="mon" style="display:none"> 월</label>
              <label class="type-btn" style="flex:none;cursor:pointer"><input type="checkbox" value="tue" style="display:none"> 화</label>
              <label class="type-btn" style="flex:none;cursor:pointer"><input type="checkbox" value="wed" style="display:none"> 수</label>
              <label class="type-btn" style="flex:none;cursor:pointer"><input type="checkbox" value="thu" style="display:none"> 목</label>
              <label class="type-btn" style="flex:none;cursor:pointer"><input type="checkbox" value="fri" style="display:none"> 금</label>
              <label class="type-btn" style="flex:none;cursor:pointer"><input type="checkbox" value="sat" style="display:none"> 토</label>
              <label class="type-btn" style="flex:none;cursor:pointer"><input type="checkbox" value="sun" style="display:none"> 일</label>
            </div>
          </div>
        </div>
      </div>
      <p class="error-msg" id="routine-error"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="routine-cancel">취소</button>
        <button class="btn btn-primary" id="routine-submit">저장</button>
      </div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h3>⚙️ 개인 정보 변경</h3>
      <div class="form-group">
        <label>이름 변경</label>
        <input type="text" id="settings-name" placeholder="새 이름">
      </div>
      <p class="error-msg" id="settings-name-error"></p>
      <button class="btn btn-primary" id="settings-name-btn" style="margin-bottom:20px">이름 저장</button>

      <hr style="border:none;border-top:1px solid var(--border);margin-bottom:20px">

      <div class="form-group">
        <label>현재 비밀번호</label>
        <input type="password" id="settings-pw-current" placeholder="현재 비밀번호">
      </div>
      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" id="settings-pw-new" placeholder="새 비밀번호 (6자 이상)">
      </div>
      <div class="form-group">
        <label>새 비밀번호 확인</label>
        <input type="password" id="settings-pw-confirm" placeholder="새 비밀번호 재입력">
      </div>
      <p class="error-msg" id="settings-pw-error"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="settings-cancel">닫기</button>
        <button class="btn btn-primary" id="settings-pw-btn">비밀번호 변경</button>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:20px 0">

      <div class="form-group">
        <label>계정 탈퇴</label>
        <input type="password" id="withdraw-password" placeholder="현재 비밀번호 입력">
      </div>
      <p class="error-msg" id="withdraw-error"></p>
      <button class="btn" style="background:var(--danger);color:white;width:100%" id="withdraw-btn">탈퇴하기</button>
    </div>
  </div>


<script type="module" src="calendar.js"></script>
</body>
</html>
